run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gocritic
    - gosimple
    - ineffassign
    - unused
    - misspell
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  goimports:
    local-prefixes: github.com/atask/atask
  misspell:
    locale: US

issues:
  exclude-rules:
    # Allow dot imports in test files
    - path: _test\.go
      linters:
        - goimports
  max-issues-per-linter: 0
  max-same-issues: 0
