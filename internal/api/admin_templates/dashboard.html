<!DOCTYPE html>
<html lang="en">
<head>{{template "head" .}}</head>
<body>
    {{template "nav" .}}
    <h1>Dashboard</h1>
    <p class="stat">{{.UserCount}}</p>
    <p class="muted">total users</p>

    <table>
        <thead>
            <tr><th>Email</th><th>Name</th><th>Role</th><th>Status</th></tr>
        </thead>
        <tbody>
            {{range .Users}}
            <tr>
                <td><a href="/admin/users/{{.ID}}">{{.Email}}</a></td>
                <td>{{.Name}}</td>
                <td>{{.Role}}</td>
                <td>{{if .Disabled}}disabled{{else}}active{{end}}</td>
            </tr>
            {{else}}
            <tr><td colspan="4" class="muted">No users yet.</td></tr>
            {{end}}
        </tbody>
    </table>
</body>
</html>
