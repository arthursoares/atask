services:
  api:
    build: .
    image: atask:latest
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DB_PATH: /app/data/atask.db
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

volumes:
  sqlite_data:
