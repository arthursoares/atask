services:
  api:
    build: .
    image: atask:latest
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: /app/data

      # Auth
      REGISTRATION_OPEN: "${REGISTRATION_OPEN:-false}"

      # Server identity (used for OAuth redirect URIs)
      BASE_URL: "${BASE_URL:-http://localhost:8080}"

      # OAuth (optional — leave unset/empty to disable a provider)
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"

      # Admin
      POCKETBASE_ADMIN_UI: "${POCKETBASE_ADMIN_UI:-false}"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
